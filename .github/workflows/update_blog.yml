name: Update Blog Posts

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update_blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install feedparser gitpython

    - name: Run script
      run: python scripts/update_blog.py

    - name: Configure Git
      run: |
        git config user.name "parang12"
        git config user.email "gitm955133@gmail.com"  # GitHub 등록 이메일

    - name: Commit and push
      run: |
        git add .
        git commit -m "Update velog posts ($(date))" || echo "No changes"
        git push origin HEAD:main
